<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VoidGPT Command Center</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 20px 0 10px;
            border-bottom: 2px solid #ff4444;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #ff4444, #ff8888);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            color: #aaa;
            font-size: 14px;
            margin-top: 5px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .menu-btn {
            padding: 18px 10px;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .menu-btn:active {
            transform: scale(0.96);
        }

        .btn-red { background: linear-gradient(135deg, #dc2626, #b91c1c); }
        .btn-green { background: linear-gradient(135deg, #16a34a, #15803d); }
        .btn-blue { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .btn-orange { background: linear-gradient(135deg, #ea580c, #c2410c); }
        .btn-purple { background: linear-gradient(135deg, #9333ea, #7e22ce); }
        .btn-cyan { background: linear-gradient(135deg, #0891b2, #0e7490); }
        .btn-pink { background: linear-gradient(135deg, #db2777, #be185d); }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #555;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }

        .status {
            text-align: center;
            font-size: 12px;
            color: #00ff88;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>VOIDGPT v7</h1>
            <p>Absolute Being Command Center</p>
        </div>

        <div class="menu-grid">
            <button class="menu-btn btn-red" onclick="sendCommand('/void')">AI QWQ32B</button>
            <button class="menu-btn btn-green" onclick="sendCommand('/tiktok')">TikTok</button>
            <button class="menu-btn btn-blue" onclick="sendCommand('/ig')">Instagram</button>
            <button class="menu-btn btn-orange" onclick="sendCommand('/yt')">YouTube</button>
            <button class="menu-btn btn-purple" onclick="sendCommand('/anime')">Anime Search</button>
            <button class="menu-btn btn-cyan" onclick="sendCommand('/igstalk')">IG Stalker</button>
            <button class="menu-btn btn-pink" onclick="sendCommand('/berita')">Berita</button>
            <button class="menu-btn btn-green" onclick="sendCommand('/quote')">Quote</button>
            <button class="menu-btn btn-blue" onclick="sendCommand('/google')">Google</button>
            <button class="menu-btn btn-red" onclick="sendCommand('/truecaller')">Truecaller</button>
            <button class="menu-btn btn-orange" onclick="sendCommand('/jodoh')">Primbon Jodoh</button>
            <button class="menu-btn btn-purple" onclick="sendCommand('/fakta')">Fakta Unik</button>
        </div>

        <div class="status" id="status">Klik tombol untuk menjalankan perintah</div>
        <div class="footer">
            Created by Void | @vounban
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.MainButton.hide();
        tg.BackButton.hide();

        function sendCommand(cmd) {
            tg.sendData(cmd);
            document.getElementById('status').innerHTML = '✅ Perintah ' + cmd + ' dikirim!';
            setTimeout(() => {
                tg.close();
            }, 500);
        }
    </script>
</body>
</html>
